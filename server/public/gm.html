<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apokrupto — GM Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #131627;
      --surface2:  #1a1e35;
      --border:    #252a45;
      --blue:      #00d4ff;
      --blue-dim:  rgba(0, 212, 255, 0.12);
      --red:       #dc143c;
      --red-dim:   rgba(220, 20, 60, 0.12);
      --green:     #00ff9f;
      --amber:     #ffd700;
      --text:      #c8cfe8;
      --muted:     #5a6080;
      --disabled:  #3a3f5c;
      --font:      'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 4px;
      color: var(--blue);
      text-transform: uppercase;
    }
    .header-center {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    #round-badge {
      color: var(--text);
      font-weight: bold;
    }
    #movement-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px;
      letter-spacing: 2px;
      font-size: 0.7rem;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    #conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--disabled);
      transition: background 0.3s;
    }
    #conn-dot.live { background: var(--green); }
    #conn-dot.offline { background: var(--red); }

    /* ── Scoreboard ── */
    #scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex-shrink: 0;
      min-height: 200px;
    }
    .team-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .team-card.phos  { border-right: 1px solid var(--border); }
    .team-card.skotia {}

    .team-name {
      font-size: 1rem;
      letter-spacing: 6px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .phos  .team-name  { color: var(--blue); }
    .skotia .team-name { color: var(--red); }

    .team-label {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .team-points {
      font-size: clamp(72px, 12vw, 140px);
      font-weight: bold;
      line-height: 1;
      letter-spacing: 2px;
      transition: all 0.4s ease;
    }
    .phos  .team-points { color: var(--blue); text-shadow: 0 0 40px rgba(0,212,255,0.4); }
    .skotia .team-points { color: var(--red);  text-shadow: 0 0 40px rgba(220,20,60,0.4); }

    .team-count {
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: var(--muted);
    }

    /* ── Game-over overlay ── */
    #game-over-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,15,26,0.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
    }
    #game-over-overlay.visible { display: flex; }
    #game-over-title {
      font-size: clamp(28px, 6vw, 56px);
      font-weight: bold;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    #game-over-sub {
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Disconnected banner ── */
    #offline-banner {
      display: none;
      background: rgba(220,20,60,0.15);
      border-bottom: 1px solid var(--red);
      color: var(--red);
      text-align: center;
      padding: 6px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #offline-banner.visible { display: block; }

    /* ── Control panel ── */
    #control-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #control-panel.visible { display: flex; }

    /* Token gate */
    #token-gate {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #token-gate label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    #token-gate input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      padding: 8px 12px;
      width: 100%;
      outline: none;
    }
    #token-gate input:focus { border-color: var(--blue); }

    /* Controls (shown after token is set) */
    #controls {
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    #controls.visible { display: flex; }

    .ctrl-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      font-family: var(--font);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 8px 18px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    button:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button.primary { border-color: var(--amber); color: var(--amber); }
    button.primary:hover:not(:disabled) { background: rgba(255,215,0,0.08); }
    button.danger { border-color: var(--red); color: var(--red); }
    button.danger:hover:not(:disabled) { background: rgba(220,20,60,0.08); }

    #broadcast-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      padding: 8px 12px;
      flex: 1;
      min-width: 200px;
      outline: none;
    }
    #broadcast-input:focus { border-color: var(--blue); }

    /* ── Player roster ── */
    #roster {
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    #roster.visible { display: flex; }

    .roster-section { display: flex; flex-direction: column; gap: 6px; }
    .roster-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 2px;
      border-bottom: 1px solid var(--border);
    }
    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 7px 12px;
      font-size: 0.8rem;
    }
    .player-row.phos-row  { border-left: 2px solid var(--blue); }
    .player-row.skotia-row { border-left: 2px solid var(--red); }
    .mark-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .section-header .toggle-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .section-header .caret { color: var(--muted); font-size: 0.8rem; }

    /* ── Groups grid ── */
    #groups-section {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: none;
    }
    #groups-section.visible { display: block; }

    .groups-header {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .groups-header-label { color: var(--muted); }
    .groups-round-badge {
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 10px;
      letter-spacing: 2px;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 10px;
    }

    .group-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .group-card-title {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .group-member {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      line-height: 1.3;
    }
    .group-member-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .group-member-dot.phos   { background: var(--blue); }
    .group-member-dot.skotia { background: var(--red);  }
    .group-member-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-member-name.skotia { color: var(--red); }
    .group-member-mark {
      font-size: 0.6rem;
      color: var(--red);
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    /* ── Lobby Selector ── */
    #setup-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #setup-screen.hidden { display: none; }

    #setup-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px 40px;
      width: 420px;
      max-width: 92vw;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    #setup-box h2 {
      font-size: 0.85rem;
      letter-spacing: 4px;
      color: var(--blue);
      text-transform: uppercase;
      text-align: center;
    }
    .setup-field { display: flex; flex-direction: column; gap: 6px; }
    .setup-field label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .setup-field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      padding: 8px 12px;
      outline: none;
    }
    .setup-field input:focus { border-color: var(--blue); }
    #setup-error {
      font-size: 0.75rem;
      color: var(--red);
      min-height: 1em;
    }

    #setup-lobby-step { display: none; flex-direction: column; gap: 12px; }
    #setup-lobby-step.visible { display: flex; }

    #setup-lobby-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
    }
    .lobby-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
      gap: 10px;
    }
    .lobby-option:hover { border-color: var(--blue); }
    .lobby-option.selected { border-color: var(--blue); background: var(--blue-dim); }
    .lobby-option-name { font-size: 0.85rem; flex: 1; }
    .lobby-option-meta { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
    .lobby-option-status {
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
    }
    .status-waiting    { color: var(--blue); background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.25); }
    .status-in_progress { color: var(--green); background: rgba(0,255,159,.1); border: 1px solid rgba(0,255,159,.25); }
    .status-completed  { color: var(--muted); background: rgba(90,96,128,.1); border: 1px solid var(--border); }

    .setup-mode-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .setup-mode-row input[type="checkbox"] { accent-color: var(--blue); width: 14px; height: 14px; }

    .setup-btn-row { display: flex; gap: 10px; }
    .setup-btn-row button { flex: 1; }
  </style>
</head>
<body>

  <!-- Lobby selector (shown when no lobbyId in URL) -->
  <div id="setup-screen">
    <div id="setup-box">
      <h2>GM Dashboard</h2>

      <!-- Step 1: login -->
      <div id="setup-login-step" style="display:flex;flex-direction:column;gap:14px;">
        <div class="setup-field">
          <label>Username</label>
          <input type="text" id="setup-username" autocomplete="username" />
        </div>
        <div class="setup-field">
          <label>Password</label>
          <input type="password" id="setup-password" autocomplete="current-password" />
        </div>
        <button onclick="setupLogin()">SIGN IN</button>
      </div>

      <div id="setup-error"></div>

      <!-- Step 2: lobby list (shown after token validated) -->
      <div id="setup-lobby-step">
        <div class="setup-field">
          <label>Select Lobby</label>
          <div id="setup-lobby-list">
            <span style="color:var(--muted);font-size:0.8rem;">Loading...</span>
          </div>
        </div>

        <div class="setup-mode-row">
          <input type="checkbox" id="setup-control-mode" checked />
          <label for="setup-control-mode" style="cursor:pointer;">Control mode (GM controls)</label>
        </div>

        <div class="setup-btn-row">
          <button onclick="setupBack()">BACK</button>
          <button class="primary" id="setup-connect-btn" onclick="setupConnect()" disabled>CONNECT</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Offline banner -->
  <div id="offline-banner">Socket disconnected — data may be stale</div>

  <!-- Header -->
  <header>
    <span class="logo">Apokrupto</span>
    <div class="header-center">
      <span id="round-badge">— / —</span>
      <span id="movement-badge">—</span>
    </div>
    <div class="header-right">
      <div id="conn-dot" class="offline"></div>
      <span id="conn-label">OFFLINE</span>
    </div>
  </header>

  <!-- Scoreboard (always visible) -->
  <div id="scoreboard">
    <div class="team-card phos">
      <span class="team-label">Team</span>
      <span class="team-name">ΦΩΣ</span>
      <span class="team-points" id="phos-pts">0</span>
      <span class="team-count" id="phos-count">— players</span>
    </div>
    <div class="team-card skotia">
      <span class="team-label">Team</span>
      <span class="team-name">ΣΚΟΤΊΑ</span>
      <span class="team-points" id="skotia-pts">0</span>
      <span class="team-count" id="skotia-count">— players</span>
    </div>
  </div>

  <!-- Groups section (shown when game has groups) -->
  <div id="groups-section">
    <div class="groups-header">
      <span class="groups-header-label">Groups</span>
      <span class="groups-round-badge" id="groups-round-badge">—</span>
    </div>
    <div id="groups-grid" class="groups-grid">
      <span style="color:var(--muted);font-size:0.75rem;">No group data yet</span>
    </div>
  </div>

  <!-- Control panel (mode=control only) -->
  <div id="control-panel">

    <!-- Token gate -->
    <div id="token-gate">
      <label for="token-input">Paste GM token to unlock controls</label>
      <div style="display:flex; gap:8px;">
        <input type="password" id="token-input" placeholder="eyJ..." autocomplete="off" />
        <button onclick="unlockControls()">UNLOCK</button>
      </div>
    </div>

    <!-- Controls (unlocked) -->
    <div id="controls">
      <div class="ctrl-row">
        <button class="primary" id="advance-btn" onclick="advanceMovement()" disabled>
          ADVANCE MOVEMENT
        </button>
      </div>
      <div class="ctrl-row">
        <input type="text" id="broadcast-input" placeholder="Broadcast message to all players..." maxlength="200" />
        <button onclick="sendBroadcast()">SEND</button>
      </div>

      <!-- Player roster (collapsible) -->
      <div class="section-header" onclick="toggleRoster()">
        <span class="toggle-label">Player Roster</span>
        <span class="caret" id="roster-caret">▼</span>
      </div>
      <div id="roster">
        <div class="roster-section">
          <div class="roster-title">ΣΚΟΤΊΑ — Darkness</div>
          <div id="skotia-list"><span style="color:var(--muted);font-size:0.75rem;">No data yet</span></div>
        </div>
        <div class="roster-section">
          <div class="roster-title">ΦΩΣ — Light</div>
          <div id="phos-list"><span style="color:var(--muted);font-size:0.75rem;">No data yet</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="game-over-overlay">
    <div id="game-over-title">—</div>
    <div id="game-over-sub">—</div>
    <button onclick="document.getElementById('game-over-overlay').classList.remove('visible')">DISMISS</button>
  </div>

  <script>
    // ── URL params ──────────────────────────────────────────────────────────
    const params    = new URLSearchParams(location.search);
    let   gameId    = params.get('gameId')  || '';
    let   lobbyId   = params.get('lobbyId') || '';
    let   isControl = params.get('mode') === 'control';
    let   gmToken   = params.get('token')   || '';

    // ── State ───────────────────────────────────────────────────────────────
    let socket = null;
    let pollInterval = null;
    let rosterOpen = false;
    let setupSelectedLobby = null; // { id, gameId }

    // ── Init ────────────────────────────────────────────────────────────────
    if (lobbyId) {
      // Params provided — skip lobby selector and connect directly
      document.getElementById('setup-screen').classList.add('hidden');
      if (isControl) {
        document.getElementById('control-panel').classList.add('visible');
        if (gmToken) unlockControls();
      }
      connectSocket();
      fetchState();
      pollInterval = setInterval(fetchState, 10000);
    }
    // else: setup-screen stays visible; user selects a lobby first

    // ── Setup functions ──────────────────────────────────────────────────────
    async function setupLogin() {
      const username = document.getElementById('setup-username').value.trim();
      const password = document.getElementById('setup-password').value;
      const errEl    = document.getElementById('setup-error');
      errEl.textContent = '';
      if (!username || !password) { errEl.textContent = 'Enter username and password.'; return; }

      try {
        const res = await fetch('/api/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        gmToken = data.token;
      } catch (err) {
        errEl.textContent = 'Login failed: ' + err.message;
        return;
      }

      // Login succeeded — hide login step, show lobby list
      document.getElementById('setup-login-step').style.display = 'none';
      const listEl = document.getElementById('setup-lobby-list');
      listEl.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">Loading...</span>';
      document.getElementById('setup-lobby-step').classList.add('visible');
      document.getElementById('setup-connect-btn').disabled = true;
      setupSelectedLobby = null;

      try {
        const res = await fetch('/api/lobbies?all=true', {
          headers: { 'Authorization': `Bearer ${gmToken}` },
        });
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          throw new Error(d.error || `HTTP ${res.status}`);
        }
        const data = await res.json();
        renderSetupLobbies(data.lobbies || []);
      } catch (err) {
        errEl.textContent = 'Could not load lobbies: ' + err.message;
      }
    }

    function renderSetupLobbies(lobbies) {
      const listEl = document.getElementById('setup-lobby-list');
      if (lobbies.length === 0) {
        listEl.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">No active lobbies found.</span>';
        return;
      }
      listEl.innerHTML = lobbies.map(l => `
        <div class="lobby-option" onclick="selectSetupLobby(${l.id}, '${escHtml(l.name)}', ${l.game_id || 'null'}, this)">
          <span class="lobby-option-name">${escHtml(l.name)}</span>
          <span class="lobby-option-meta">${l.current_players}/${l.max_players}</span>
          <span class="lobby-option-status status-${l.status}">${l.status.replace('_',' ')}</span>
        </div>
      `).join('');
    }

    function selectSetupLobby(id, name, gId, el) {
      document.querySelectorAll('.lobby-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      setupSelectedLobby = { id, name, gameId: gId ? String(gId) : '' };
      document.getElementById('setup-connect-btn').disabled = false;
    }

    function setupBack() {
      document.getElementById('setup-lobby-step').classList.remove('visible');
      document.getElementById('setup-login-step').style.display = 'flex';
      document.getElementById('setup-error').textContent = '';
      setupSelectedLobby = null;
      gmToken = '';
      document.getElementById('setup-connect-btn').disabled = true;
    }

    function setupConnect() {
      if (!setupSelectedLobby) return;
      lobbyId   = String(setupSelectedLobby.id);
      gameId    = setupSelectedLobby.gameId || '';
      isControl = document.getElementById('setup-control-mode').checked;

      document.getElementById('setup-screen').classList.add('hidden');

      if (isControl) {
        document.getElementById('control-panel').classList.add('visible');
        // Token already set; bypass the token-gate and unlock directly
        unlockControls();
      }

      connectSocket();
      fetchState();
      pollInterval = setInterval(fetchState, 10000);
    }

    // ── Socket ──────────────────────────────────────────────────────────────
    function connectSocket() {
      // Unauthenticated connection for scoreboard; authenticated for control
      const opts = {
        transports: ['websocket', 'polling'],
        reconnection: true,
      };
      if (gmToken) opts.auth = { token: gmToken };

      socket = io(opts);

      socket.on('connect', () => {
        setConnected(true);
        if (lobbyId) socket.emit('joinRoom', { lobbyId });
      });

      socket.on('disconnect', () => setConnected(false));
      socket.on('connect_error', () => setConnected(false));

      socket.on('gameStateUpdate', (data) => {
        applyState(data);
      });

      socket.on('gameOver', ({ winner, reason } = {}) => {
        showGameOver(winner, reason);
      });

      socket.on('lobbyClosed', () => {
        document.getElementById('offline-banner').textContent = 'Lobby closed.';
        document.getElementById('offline-banner').classList.add('visible');
      });
    }

    // ── REST poll ───────────────────────────────────────────────────────────
    async function fetchState() {
      if (!gameId) return;
      const headers = {};
      if (gmToken) headers['Authorization'] = `Bearer ${gmToken}`;
      try {
        const res = await fetch(`/api/games/${gameId}/gm-state`, { headers });
        if (!res.ok) return;
        const data = await res.json();
        applyState(data);
      } catch (_) {}
    }

    // ── Apply game state to DOM ─────────────────────────────────────────────
    function applyState({ players = [], groups = [], gameState = {}, teamPoints = {} } = {}) {
      // Scores
      setText('phos-pts',    teamPoints.phos   ?? 0);
      setText('skotia-pts',  teamPoints.skotia ?? 0);

      // Player counts
      const phosPlayers   = players.filter(p => p.team === 'phos');
      const skotiaPlayers = players.filter(p => p.team === 'skotia');
      setText('phos-count',   phosPlayers.length   + ' player' + (phosPlayers.length   !== 1 ? 's' : ''));
      setText('skotia-count', skotiaPlayers.length + ' player' + (skotiaPlayers.length !== 1 ? 's' : ''));

      // Round / movement
      const round = gameState.round;
      const total = gameState.totalRounds;
      setText('round-badge',    round ? `ROUND ${round} / ${total}` : '— / —');
      const movLabel = { A: 'MOV A — DEDUCTION', B: 'MOV B — TASKS', C: 'MOV C — VOTING' };
      setText('movement-badge', movLabel[gameState.movement] || '—');

      // Groups (always shown when data exists)
      if (groups.length > 0) {
        setText('groups-round-badge', round ? `ROUND ${round}` : '—');
        document.getElementById('groups-section').classList.add('visible');
        renderGroups(groups);
      }

      // Roster (control mode)
      if (isControl) {
        renderRoster('phos-list',   phosPlayers,   'phos-row');
        renderRoster('skotia-list', skotiaPlayers, 'skotia-row');
      }
    }

    function renderGroups(groups) {
      const el = document.getElementById('groups-grid');
      if (!groups || groups.length === 0) {
        el.innerHTML = '<span style="color:var(--muted);font-size:0.75rem;">No group data yet</span>';
        return;
      }
      el.innerHTML = groups.map(g => `
        <div class="group-card">
          <div class="group-card-title">Group ${g.groupIndex}</div>
          ${g.members.map(m => `
            <div class="group-member">
              <div class="group-member-dot ${m.team}"></div>
              <span class="group-member-name${m.team === 'skotia' ? ' skotia' : ''}">${escHtml(m.username)}</span>
              ${m.isMarked ? '<span class="group-member-mark" title="Marked">●</span>' : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function renderRoster(containerId, players, rowClass) {
      const el = document.getElementById(containerId);
      if (players.length === 0) {
        el.innerHTML = '<span style="color:var(--muted);font-size:0.75rem;">No players yet</span>';
        return;
      }
      el.innerHTML = players.map(p => `
        <div class="player-row ${rowClass}">
          <span>${escHtml(p.username)}</span>
          ${p.isMarked ? '<div class="mark-dot" title="Marked"></div>' : ''}
        </div>`
      ).join('');
    }

    // ── Connection indicator ────────────────────────────────────────────────
    function setConnected(live) {
      const dot   = document.getElementById('conn-dot');
      const label = document.getElementById('conn-label');
      const banner = document.getElementById('offline-banner');
      dot.className = live ? 'live' : 'offline';
      label.textContent = live ? 'LIVE' : 'OFFLINE';
      if (live) banner.classList.remove('visible');
      else      banner.classList.add('visible');

      // Advance button requires live socket
      const btn = document.getElementById('advance-btn');
      if (btn) btn.disabled = !live;
    }

    // ── Game over ───────────────────────────────────────────────────────────
    function showGameOver(winner, reason) {
      const titleEl = document.getElementById('game-over-title');
      const subEl   = document.getElementById('game-over-sub');

      if (winner === 'phos') {
        titleEl.style.color = 'var(--blue)';
        titleEl.textContent = 'ΦΩΣ WINS';
      } else if (winner === 'skotia') {
        titleEl.style.color = 'var(--red)';
        titleEl.textContent = 'ΣΚΟΤΊΑ WINS';
      } else {
        titleEl.style.color = 'var(--text)';
        titleEl.textContent = 'GAME OVER';
      }

      subEl.textContent = reason ? reason.toUpperCase() : '';
      document.getElementById('game-over-overlay').classList.add('visible');
    }

    // ── Control panel actions ───────────────────────────────────────────────
    function unlockControls() {
      const input = document.getElementById('token-input');
      const val = (input && input.value.trim()) || gmToken;
      if (!val) return;
      gmToken = val;
      document.getElementById('token-gate').style.display = 'none';
      document.getElementById('controls').classList.add('visible');

      // Reconnect socket with auth token if already connected without it
      if (socket) { socket.disconnect(); connectSocket(); }
    }

    function advanceMovement() {
      if (!socket || !socket.connected) return;
      socket.emit('gmAdvance', { gameId }, (res) => {
        if (res && res.error) alert('Error: ' + res.error);
      });
    }

    async function sendBroadcast() {
      const input = document.getElementById('broadcast-input');
      const message = input.value.trim();
      if (!message || !gameId || !lobbyId || !gmToken) return;

      try {
        await fetch(`/api/games/${gameId}/broadcast`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${gmToken}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message, lobbyId }),
        });
        input.value = '';
      } catch (err) {
        alert('Broadcast failed: ' + err.message);
      }
    }

    function toggleRoster() {
      rosterOpen = !rosterOpen;
      document.getElementById('roster').classList.toggle('visible', rosterOpen);
      document.getElementById('roster-caret').textContent = rosterOpen ? '▲' : '▼';
    }

    // ── Helpers ─────────────────────────────────────────────────────────────
    function setText(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Enter key on broadcast input
    document.addEventListener('DOMContentLoaded', () => {
      const bi = document.getElementById('broadcast-input');
      if (bi) bi.addEventListener('keydown', e => { if (e.key === 'Enter') sendBroadcast(); });
      const sp = document.getElementById('setup-password');
      if (sp) sp.addEventListener('keydown', e => { if (e.key === 'Enter') setupLogin(); });
    });
  </script>
</body>
</html>
