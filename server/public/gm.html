<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apokrupto — GM Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #131627;
      --surface2:  #1a1e35;
      --border:    #252a45;
      --blue:      #00d4ff;
      --blue-dim:  rgba(0, 212, 255, 0.12);
      --red:       #dc143c;
      --red-dim:   rgba(220, 20, 60, 0.12);
      --green:     #00ff9f;
      --amber:     #ffd700;
      --text:      #c8cfe8;
      --muted:     #5a6080;
      --disabled:  #3a3f5c;
      --font:      'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 4px;
      color: var(--blue);
      text-transform: uppercase;
    }
    .header-center {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    #round-badge {
      color: var(--text);
      font-weight: bold;
    }
    #movement-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px;
      letter-spacing: 2px;
      font-size: 0.7rem;
    }
    #timer-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px;
      letter-spacing: 2px;
      font-size: 0.7rem;
      font-weight: bold;
      color: var(--text);
      display: none;
    }
    #timer-badge.visible { display: inline; }
    #timer-badge.urgent { color: var(--red); border-color: var(--red); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    #change-lobby-btn {
      font-size: 0.65rem;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-color: var(--muted);
      color: var(--muted);
    }
    #change-lobby-btn:hover { border-color: var(--blue); color: var(--blue); }
    #conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--disabled);
      transition: background 0.3s;
    }
    #conn-dot.live { background: var(--green); }
    #conn-dot.offline { background: var(--red); }

    /* ── Scoreboard ── */
    #scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex-shrink: 0;
      min-height: 180px;
    }
    .team-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .team-card.phos  { border-right: 1px solid var(--border); }

    .team-name {
      font-size: 1rem;
      letter-spacing: 6px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .phos  .team-name  { color: var(--blue); }
    .skotia .team-name { color: var(--red); }

    .team-label {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .team-points {
      font-size: clamp(60px, 10vw, 120px);
      font-weight: bold;
      line-height: 1;
      letter-spacing: 2px;
      transition: all 0.4s ease;
    }
    .phos  .team-points { color: var(--blue); text-shadow: 0 0 40px rgba(0,212,255,0.4); }
    .skotia .team-points { color: var(--red);  text-shadow: 0 0 40px rgba(220,20,60,0.4); }

    /* ── Score ratio bar ── */
    #score-bar-wrap {
      padding: 14px 20px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    #score-bar {
      height: 28px;
      display: flex;
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    #score-bar-phos {
      background: var(--blue);
      box-shadow: 6px 0 24px rgba(0, 212, 255, 0.5);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      width: 50%;
    }
    #score-bar-skotia {
      background: var(--red);
      box-shadow: -6px 0 24px rgba(220, 20, 60, 0.5);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      width: 50%;
    }
    .score-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #score-bar-phos-pct { color: var(--blue); }
    #score-bar-skotia-pct { color: var(--red); }

    /* ── Round / Movement indicator ── */
    #round-movement-section {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #round-movement-section.visible { display: flex; }

    .indicator-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .indicator-label {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .pip-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .round-pip, .mov-pip {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: var(--muted);
      transition: border-color 0.3s, background 0.3s, color 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .round-pip.past, .mov-pip.done {
      border-color: rgba(0, 255, 159, 0.45);
      background: rgba(0, 255, 159, 0.08);
      color: var(--green);
    }
    .round-pip.current, .mov-pip.active {
      border-color: var(--blue);
      background: rgba(0, 212, 255, 0.12);
      color: var(--blue);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.25);
    }

    /* ── Large Timer ── */
    #timer-section {
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      height: 20vh;
      min-height: 100px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 6px;
    }
    #timer-section.visible { display: flex; }
    #timer-section-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }
    #timer-section-value {
      font-size: clamp(48px, 12vw, 120px);
      font-weight: bold;
      line-height: 1;
      letter-spacing: 4px;
      color: var(--text);
      transition: color 0.3s;
    }
    #timer-section.urgent #timer-section-value {
      color: var(--red);
      text-shadow: 0 0 30px rgba(220,20,60,0.5);
    }

    /* ── Movement A turn progress row ── */
    #mova-turn-row {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    #mova-turn-row.visible { display: flex; }
    #mova-turn-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }
    #mova-turn-label.deliberation { color: var(--amber); }
    #mova-slot-dots {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .slot-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: bold;
      color: var(--muted);
      transition: border-color 0.3s, background 0.3s, color 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .slot-dot.done {
      border-color: rgba(0,255,159,0.45);
      background: rgba(0,255,159,0.08);
      color: var(--green);
    }
    .slot-dot.active {
      border-color: var(--blue);
      background: rgba(0,212,255,0.15);
      color: var(--blue);
      box-shadow: 0 0 8px rgba(0,212,255,0.35);
    }
    .slot-dot.deliberation {
      border-color: var(--amber);
      background: rgba(255,215,0,0.12);
      color: var(--amber);
    }

    /* ── Game-over overlay ── */
    #game-over-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,15,26,0.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
    }
    #game-over-overlay.visible { display: flex; }
    #game-over-title {
      font-size: clamp(28px, 6vw, 56px);
      font-weight: bold;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    #game-over-sub {
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Disconnected banner ── */
    #offline-banner {
      display: none;
      background: rgba(220,20,60,0.15);
      border-bottom: 1px solid var(--red);
      color: var(--red);
      text-align: center;
      padding: 6px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #offline-banner.visible { display: block; }

    /* ── Control panel ── */
    #control-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #control-panel.visible { display: flex; }

    /* Token gate */
    #token-gate {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #token-gate label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    #token-gate input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      padding: 8px 12px;
      width: 100%;
      outline: none;
    }
    #token-gate input:focus { border-color: var(--blue); }

    /* Controls (shown after token is set) */
    #controls {
      display: none;
    }
    #controls.visible { display: flex; flex-direction: column; gap: 14px; }

    .ctrl-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      font-family: var(--font);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 8px 18px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    button:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button.primary { border-color: var(--amber); color: var(--amber); }
    button.primary:hover:not(:disabled) { background: rgba(255,215,0,0.08); }

    /* ── Groups grid ── */
    #groups-section {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: none;
      flex: 1;
      overflow-y: auto;
    }
    #groups-section.visible { display: block; }

    .groups-header {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .groups-header-label { color: var(--muted); }
    .groups-round-badge {
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 10px;
      letter-spacing: 2px;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 10px;
    }

    .group-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .group-card-title {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .group-member {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 7px;
      font-size: 0.8rem;
      line-height: 1.3;
    }
    .group-member-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-member-name.sus { color: var(--red); }
    .group-member-mark {
      font-size: 0.55rem;
      color: var(--red);
      letter-spacing: 1px;
      border: 1px solid rgba(220,20,60,0.4);
      padding: 1px 4px;
      flex-shrink: 0;
    }

    /* ── Lobby Selector ── */
    #setup-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #setup-screen.hidden { display: none; }

    #setup-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px 40px;
      width: 420px;
      max-width: 92vw;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    #setup-box h2 {
      font-size: 0.85rem;
      letter-spacing: 4px;
      color: var(--blue);
      text-transform: uppercase;
      text-align: center;
    }
    .setup-field { display: flex; flex-direction: column; gap: 6px; }
    .setup-field label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .setup-field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      padding: 8px 12px;
      outline: none;
    }
    .setup-field input:focus { border-color: var(--blue); }
    #setup-error {
      font-size: 0.75rem;
      color: var(--red);
      min-height: 1em;
    }

    #setup-lobby-step { display: none; flex-direction: column; gap: 12px; }
    #setup-lobby-step.visible { display: flex; }

    #setup-lobby-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
    }
    .lobby-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
      gap: 10px;
    }
    .lobby-option:hover { border-color: var(--blue); }
    .lobby-option.selected { border-color: var(--blue); background: var(--blue-dim); }
    .lobby-option-name { font-size: 0.85rem; flex: 1; }
    .lobby-option-meta { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
    .lobby-option-status {
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
    }
    .status-waiting    { color: var(--blue); background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.25); }
    .status-in_progress { color: var(--green); background: rgba(0,255,159,.1); border: 1px solid rgba(0,255,159,.25); }
    .status-completed  { color: var(--muted); background: rgba(90,96,128,.1); border: 1px solid var(--border); }

    .setup-mode-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .setup-mode-row input[type="checkbox"] { accent-color: var(--blue); width: 14px; height: 14px; }

    .setup-btn-row { display: flex; gap: 10px; }
    .setup-btn-row button { flex: 1; }
  </style>
</head>
<body>

  <!-- Lobby selector (shown when no lobbyId in URL) -->
  <div id="setup-screen">
    <div id="setup-box">
      <h2>GM Dashboard</h2>

      <!-- Step 1: login -->
      <div id="setup-login-step" style="display:flex;flex-direction:column;gap:14px;">
        <div class="setup-field">
          <label>Username</label>
          <input type="text" id="setup-username" autocomplete="username" />
        </div>
        <div class="setup-field">
          <label>Password</label>
          <input type="password" id="setup-password" autocomplete="current-password" />
        </div>
        <button onclick="setupLogin()">SIGN IN</button>
      </div>

      <div id="setup-error"></div>

      <!-- Step 2: lobby list (shown after token validated) -->
      <div id="setup-lobby-step">
        <div class="setup-field">
          <label>Select Lobby</label>
          <div id="setup-lobby-list">
            <span style="color:var(--muted);font-size:0.8rem;">Loading...</span>
          </div>
        </div>

        <div class="setup-mode-row">
          <input type="checkbox" id="setup-control-mode" checked />
          <label for="setup-control-mode" style="cursor:pointer;">Control mode (GM controls)</label>
        </div>

        <div class="setup-btn-row">
          <button onclick="setupBack()">BACK</button>
          <button class="primary" id="setup-connect-btn" onclick="setupConnect()" disabled>CONNECT</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Offline banner -->
  <div id="offline-banner">Socket disconnected — data may be stale</div>

  <!-- Header -->
  <header>
    <span class="logo">Apokrupto</span>
    <div class="header-center">
      <span id="round-badge">— / —</span>
      <span id="movement-badge">—</span>
      <span id="timer-badge">--:--</span>
    </div>
    <div class="header-right">
      <button id="change-lobby-btn" onclick="changeSession()" style="display:none;">CHANGE LOBBY</button>
      <div id="conn-dot" class="offline"></div>
      <span id="conn-label">OFFLINE</span>
    </div>
  </header>

  <!-- Scoreboard -->
  <div id="scoreboard">
    <div class="team-card phos">
      <span class="team-label">Team</span>
      <span class="team-name">ΦΩΣ</span>
      <span class="team-points" id="phos-pts">0</span>
    </div>
    <div class="team-card skotia">
      <span class="team-label">Team</span>
      <span class="team-name">ΣΚΟΤΊΑ</span>
      <span class="team-points" id="skotia-pts">0</span>
    </div>
  </div>

  <!-- Score ratio bar -->
  <div id="score-bar-wrap">
    <div id="score-bar">
      <div id="score-bar-phos"></div>
      <div id="score-bar-skotia"></div>
    </div>
    <div class="score-bar-labels">
      <span id="score-bar-phos-pct">ΦΩΣ 50%</span>
      <span id="score-bar-skotia-pct">ΣΚΟΤΊΑ 50%</span>
    </div>
  </div>

  <!-- Round & Movement indicator -->
  <div id="round-movement-section">
    <div class="indicator-group">
      <span class="indicator-label">Round</span>
      <div class="pip-row" id="round-pip-row"></div>
    </div>
    <div class="indicator-group">
      <span class="indicator-label">Movement</span>
      <div class="pip-row">
        <div class="mov-pip" id="mov-pip-A">A</div>
        <div class="mov-pip" id="mov-pip-C">C</div>
        <div class="mov-pip" id="mov-pip-B">B</div>
      </div>
    </div>
  </div>

  <!-- Large Timer -->
  <div id="timer-section">
    <span id="timer-section-label">Time Remaining</span>
    <span id="timer-section-value">--:--</span>
    <!-- Movement A turn progress -->
    <div id="mova-turn-row">
      <div id="mova-slot-dots"></div>
      <span id="mova-turn-label">TURN — / —</span>
    </div>
  </div>

  <!-- Groups section -->
  <div id="groups-section">
    <div class="groups-header">
      <span class="groups-header-label">Groups</span>
      <span class="groups-round-badge" id="groups-round-badge">—</span>
    </div>
    <div id="groups-grid" class="groups-grid">
      <span style="color:var(--muted);font-size:0.75rem;">No group data yet</span>
    </div>
  </div>

  <!-- Control panel (control mode only) -->
  <div id="control-panel">

    <!-- Token gate -->
    <div id="token-gate">
      <label for="token-input">Paste GM token to unlock controls</label>
      <div style="display:flex; gap:8px;">
        <input type="password" id="token-input" placeholder="eyJ..." autocomplete="off" />
        <button onclick="unlockControls()">UNLOCK</button>
      </div>
    </div>

    <!-- Controls (unlocked) -->
    <div id="controls">
      <div class="ctrl-row">
        <button class="primary" id="advance-btn" onclick="advanceMovement()" disabled>
          ADVANCE MOVEMENT
        </button>
      </div>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="game-over-overlay">
    <div id="game-over-title">—</div>
    <div id="game-over-sub">—</div>
    <button onclick="document.getElementById('game-over-overlay').classList.remove('visible')">DISMISS</button>
  </div>

  <script>
    // ── URL params ──────────────────────────────────────────────────────────
    const params    = new URLSearchParams(location.search);
    let   gameId    = params.get('gameId')  || '';
    let   lobbyId   = params.get('lobbyId') || '';
    let   isControl = params.get('mode') === 'control';
    let   gmToken   = params.get('token')   || '';

    // ── State ───────────────────────────────────────────────────────────────
    let socket = null;
    let pollInterval = null;
    let setupSelectedLobby = null;

    // Round / movement bubble state
    let _currentRound      = 0;
    let _totalRounds       = 0;
    let _activeMovement    = null;
    let _completedMovements = new Set();

    // ── Session persistence ─────────────────────────────────────────────────
    const SESSION_KEY = 'apk_gm_session';

    function saveSession() {
      try {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({
          token: gmToken, lobbyId, gameId, isControl,
        }));
      } catch (_) {}
    }

    function loadSession() {
      try {
        const raw = sessionStorage.getItem(SESSION_KEY);
        if (!raw) return false;
        const s = JSON.parse(raw);
        if (!s.token || !s.lobbyId) return false;
        gmToken   = s.token;
        lobbyId   = s.lobbyId;
        gameId    = s.gameId   || gameId;
        isControl = s.isControl ?? isControl;
        return true;
      } catch (_) { return false; }
    }

    function clearSession() {
      try { sessionStorage.removeItem(SESSION_KEY); } catch (_) {}
    }

    function changeSession() {
      clearSession();
      if (socket) { socket.disconnect(); socket = null; }
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      stopTimer();
      gmToken = ''; lobbyId = ''; gameId = ''; isControl = false;
      document.getElementById('change-lobby-btn').style.display = 'none';
      document.getElementById('setup-screen').classList.remove('hidden');
      document.getElementById('control-panel').classList.remove('visible');
      document.getElementById('setup-login-step').style.display = 'flex';
      document.getElementById('setup-lobby-step').classList.remove('visible');
      document.getElementById('setup-error').textContent = '';
    }

    // ── Round / movement bubbles ─────────────────────────────────────────────
    function updateRoundMovementBubbles() {
      const section = document.getElementById('round-movement-section');
      if (!_totalRounds) { section.classList.remove('visible'); return; }
      section.classList.add('visible');

      // Round pips — one circle per round
      const pipRow = document.getElementById('round-pip-row');
      let html = '';
      for (let i = 1; i <= _totalRounds; i++) {
        let cls = 'round-pip';
        if (i < _currentRound)      cls += ' past';
        else if (i === _currentRound) cls += ' current';
        html += `<div class="${cls}">${i}</div>`;
      }
      pipRow.innerHTML = html;

      // Movement pips — A / C / B
      for (const m of ['A', 'C', 'B']) {
        const pip = document.getElementById(`mov-pip-${m}`);
        if (!pip) continue;
        pip.className = 'mov-pip';
        if (_completedMovements.has(m))   pip.classList.add('done');
        else if (_activeMovement === m)   pip.classList.add('active');
      }
    }

    // ── Movement timer ──────────────────────────────────────────────────────
    let _timerEndsAt = null;
    let _timerInterval = null;

    function startTimer(endsAt) {
      stopTimer();
      if (!endsAt) return;
      _timerEndsAt = endsAt;
      const badge = document.getElementById('timer-badge');
      const section = document.getElementById('timer-section');
      badge.classList.add('visible');
      section.classList.add('visible');
      const tick = () => {
        const secs = Math.max(0, Math.round((_timerEndsAt - Date.now()) / 1000));
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        const display = m + ':' + String(s).padStart(2, '0');
        badge.textContent = display;
        document.getElementById('timer-section-value').textContent = display;
        const isUrgent = secs <= 15;
        badge.classList.toggle('urgent', isUrgent);
        section.classList.toggle('urgent', isUrgent);
        if (secs <= 0) stopTimer();
      };
      tick();
      _timerInterval = setInterval(tick, 1000);
    }

    function stopTimer() {
      if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
      _timerEndsAt = null;
      const badge = document.getElementById('timer-badge');
      const section = document.getElementById('timer-section');
      badge.classList.remove('visible', 'urgent');
      badge.textContent = '--:--';
      section.classList.remove('visible', 'urgent');
      document.getElementById('timer-section-value').textContent = '--:--';
    }

    // ── Movement A turn-progress row ────────────────────────────────────────
    function updateMovATurnRow(phase, turnIndex, totalTurns) {
      const row   = document.getElementById('mova-turn-row');
      const label = document.getElementById('mova-turn-label');
      const dots  = document.getElementById('mova-slot-dots');
      if (totalTurns == null) { row.classList.remove('visible'); return; }

      row.classList.add('visible');

      // Build slot dots
      let html = '';
      for (let i = 0; i < totalTurns; i++) {
        let cls = 'slot-dot';
        if (phase === 'deliberation') {
          cls += ' deliberation';
        } else if (i < turnIndex) {
          cls += ' done';
        } else if (i === turnIndex) {
          cls += ' active';
        }
        html += `<div class="${cls}">${i + 1}</div>`;
      }
      dots.innerHTML = html;

      // Label
      if (phase === 'deliberation') {
        label.textContent = 'DELIBERATION';
        label.classList.add('deliberation');
      } else {
        label.textContent = `TURN ${(turnIndex ?? 0) + 1} / ${totalTurns}`;
        label.classList.remove('deliberation');
      }
    }

    function clearMovATurnRow() {
      document.getElementById('mova-turn-row').classList.remove('visible');
      document.getElementById('mova-turn-label').textContent = 'TURN — / —';
      document.getElementById('mova-slot-dots').innerHTML = '';
      setText('timer-section-label', 'Time Remaining');
    }

    // ── Init ────────────────────────────────────────────────────────────────
    function launchDashboard() {
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('change-lobby-btn').style.display = 'inline';
      if (isControl) {
        document.getElementById('control-panel').classList.add('visible');
        if (gmToken) unlockControls();
      }
      connectSocket();
      fetchState();
      pollInterval = setInterval(fetchState, 3000);
    }

    if (lobbyId) {
      launchDashboard();
    } else if (!lobbyId && loadSession()) {
      launchDashboard();
    }

    // ── Setup functions ──────────────────────────────────────────────────────
    async function setupLogin() {
      const username = document.getElementById('setup-username').value.trim();
      const password = document.getElementById('setup-password').value;
      const errEl    = document.getElementById('setup-error');
      errEl.textContent = '';
      if (!username || !password) { errEl.textContent = 'Enter username and password.'; return; }

      try {
        const res = await fetch('/api/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        gmToken = data.token;
      } catch (err) {
        errEl.textContent = 'Login failed: ' + err.message;
        return;
      }

      document.getElementById('setup-login-step').style.display = 'none';
      const listEl = document.getElementById('setup-lobby-list');
      listEl.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">Loading...</span>';
      document.getElementById('setup-lobby-step').classList.add('visible');
      document.getElementById('setup-connect-btn').disabled = true;
      setupSelectedLobby = null;

      try {
        const res = await fetch('/api/lobbies?all=true', {
          headers: { 'Authorization': `Bearer ${gmToken}` },
        });
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          throw new Error(d.error || `HTTP ${res.status}`);
        }
        const data = await res.json();
        renderSetupLobbies(data.lobbies || []);
      } catch (err) {
        errEl.textContent = 'Could not load lobbies: ' + err.message;
      }
    }

    function renderSetupLobbies(lobbies) {
      const listEl = document.getElementById('setup-lobby-list');
      if (lobbies.length === 0) {
        listEl.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">No active lobbies found.</span>';
        return;
      }
      listEl.innerHTML = lobbies.map(l => `
        <div class="lobby-option" onclick="selectSetupLobby(${l.id}, '${escHtml(l.name)}', ${l.game_id || 'null'}, this)">
          <span class="lobby-option-name">${escHtml(l.name)}</span>
          <span class="lobby-option-meta">${l.current_players}/${l.max_players}</span>
          <span class="lobby-option-status status-${l.status}">${l.status.replace('_',' ')}</span>
        </div>
      `).join('');
    }

    function selectSetupLobby(id, name, gId, el) {
      document.querySelectorAll('.lobby-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      setupSelectedLobby = { id, name, gameId: gId ? String(gId) : '' };
      document.getElementById('setup-connect-btn').disabled = false;
    }

    function setupBack() {
      document.getElementById('setup-lobby-step').classList.remove('visible');
      document.getElementById('setup-login-step').style.display = 'flex';
      document.getElementById('setup-error').textContent = '';
      setupSelectedLobby = null;
      gmToken = '';
      clearSession();
      document.getElementById('setup-connect-btn').disabled = true;
    }

    function setupConnect() {
      if (!setupSelectedLobby) return;
      lobbyId   = String(setupSelectedLobby.id);
      gameId    = setupSelectedLobby.gameId || '';
      isControl = document.getElementById('setup-control-mode').checked;
      saveSession();
      launchDashboard();
    }

    // ── Socket ──────────────────────────────────────────────────────────────
    function connectSocket() {
      const opts = {
        transports: ['websocket', 'polling'],
        reconnection: true,
      };
      if (gmToken) opts.auth = { token: gmToken };

      socket = io(opts);

      socket.on('connect', () => {
        setConnected(true);
        if (lobbyId) socket.emit('joinRoom', { lobbyId });
      });

      socket.on('disconnect', () => setConnected(false));
      socket.on('connect_error', () => setConnected(false));

      socket.on('gameStateUpdate', (data) => applyState(data));

      // Game just started — capture the gameId so advance/polling work
      socket.on('gameStarted', (data) => {
        if (data && data.gameId) {
          gameId = String(data.gameId);
          saveSession();
          fetchState();
        }
      });

      // Refresh state on any movement event
      socket.on('movementStart', ({ movement, roundNumber, totalRounds, movementBEndsAt }) => {
        const movLabel = { A: 'MOV A — IMPOSTOR', B: 'MOV B — CHALLENGES', C: 'MOV C — VOTING' };
        if (movement) setText('movement-badge', movLabel[movement] || '—');
        if (roundNumber) setText('round-badge', `ROUND ${roundNumber} / ${totalRounds || '?'}`);
        if (movement === 'B' && movementBEndsAt) { clearMovATurnRow(); startTimer(movementBEndsAt); }
        else if (movement === 'C') { clearMovATurnRow(); stopTimer(); } // stopTimer; votingReady drives C timer
        else if (movement === 'A') stopTimer(); // timer for A is driven by movementATurnUpdate
        // Update bubble state
        if (movement) _activeMovement = movement;
        if (roundNumber) _currentRound = roundNumber;
        if (totalRounds) _totalRounds = totalRounds;
        updateRoundMovementBubbles();
        fetchState();
      });

      socket.on('movementATurnUpdate', ({ phase, slotStartedAt, timeLimit, turnIndex, totalTurns }) => {
        if (phase === 'active') {
          startTimer((slotStartedAt || Date.now()) + (timeLimit || 30) * 1000);
          setText('timer-section-label', 'SLOT TIME — MOVEMENT A');
        } else {
          stopTimer(); // deliberation — no countdown
          setText('timer-section-label', 'DELIBERATION');
          // Show timer section without a running clock
          document.getElementById('timer-section').classList.add('visible');
        }
        updateMovATurnRow(phase, turnIndex, totalTurns);
      });

      socket.on('votingReady', ({ votingEndsAt }) => {
        if (votingEndsAt) startTimer(votingEndsAt);
      });

      socket.on('movementComplete', ({ movement }) => {
        setText('movement-badge', `${movement} COMPLETE`);
        stopTimer();
        if (movement === 'A') clearMovATurnRow();
        if (movement) { _completedMovements.add(movement); _activeMovement = null; }
        updateRoundMovementBubbles();
        fetchState();
      });

      socket.on('roundSummary', () => fetchState());
      socket.on('roundSetup', ({ roundNumber, totalRounds }) => {
        if (roundNumber) setText('round-badge', `ROUND ${roundNumber} / ${totalRounds || '?'}`);
        setText('movement-badge', '—');
        stopTimer();
        clearMovATurnRow();
        // New round — reset movement pips
        _completedMovements = new Set();
        _activeMovement = null;
        if (roundNumber) _currentRound = roundNumber;
        if (totalRounds) _totalRounds = totalRounds;
        updateRoundMovementBubbles();
        fetchState();
      });

      socket.on('gameOver', ({ winner, condition } = {}) => {
        stopTimer();
        showGameOver(winner, condition);
      });

      socket.on('lobbyClosed', () => {
        document.getElementById('offline-banner').textContent = 'Lobby closed.';
        document.getElementById('offline-banner').classList.add('visible');
      });
    }

    // ── REST poll ───────────────────────────────────────────────────────────
    async function fetchState() {
      if (!gameId) return;
      const headers = {};
      if (gmToken) headers['Authorization'] = `Bearer ${gmToken}`;
      try {
        const res = await fetch(`/api/games/${gameId}/gm-state`, { headers });
        if (!res.ok) return;
        const data = await res.json();
        applyState(data);
      } catch (_) {}
    }

    // ── Apply game state to DOM ─────────────────────────────────────────────
    function applyState({ players = [], groups = [], gameState = {}, teamPoints = {}, movementBEndsAt, votingEndsAt } = {}) {
      const phos   = teamPoints.phos   ?? 0;
      const skotia = teamPoints.skotia ?? 0;

      setText('phos-pts',   phos);
      setText('skotia-pts', skotia);

      updateScoreBar(phos, skotia);

      const round = gameState.round;
      const total = gameState.totalRounds;
      setText('round-badge',    round ? `ROUND ${round} / ${total}` : '— / —');
      const movLabel = { A: 'MOV A — IMPOSTOR', B: 'MOV B — CHALLENGES', C: 'MOV C — VOTING' };
      setText('movement-badge', movLabel[gameState.movement] || '—');

      // Seed bubble state from REST data (handles page refresh / reconnect)
      if (round)  _currentRound = round;
      if (total)  _totalRounds  = total;
      if (gameState.movement && gameState.movement !== _activeMovement) {
        _activeMovement = gameState.movement;
      }
      if (gameState.completedMovements) {
        for (const m of gameState.completedMovements) _completedMovements.add(m);
      }
      updateRoundMovementBubbles();

      // Start timer from REST data if not already running (reconnect / page refresh)
      if (movementBEndsAt && movementBEndsAt > Date.now() && !_timerInterval) {
        startTimer(movementBEndsAt);
      } else if (votingEndsAt && votingEndsAt > Date.now() && !_timerInterval) {
        startTimer(votingEndsAt);
      } else if (!movementBEndsAt && !votingEndsAt && gameState.movement !== 'B' && gameState.movement !== 'C') {
        stopTimer();
      }

      if (groups.length > 0) {
        setText('groups-round-badge', round ? `ROUND ${round}` : '—');
        document.getElementById('groups-section').classList.add('visible');
        renderGroups(groups);
      }
    }

    function updateScoreBar(phos, skotia) {
      const total    = (phos || 0) + (skotia || 0);
      const phosPct  = total === 0 ? 50 : Math.round((phos   / total) * 100);
      const skotiaPct = 100 - phosPct;

      document.getElementById('score-bar-phos').style.width   = phosPct   + '%';
      document.getElementById('score-bar-skotia').style.width = skotiaPct + '%';
      setText('score-bar-phos-pct',   'ΦΩΣ '     + phosPct   + '%');
      setText('score-bar-skotia-pct', 'ΣΚΟΤΊΑ ' + skotiaPct + '%');
    }

    function renderGroups(groups) {
      const el = document.getElementById('groups-grid');
      if (!groups || groups.length === 0) {
        el.innerHTML = '<span style="color:var(--muted);font-size:0.75rem;">No group data yet</span>';
        return;
      }
      el.innerHTML = groups.map(g => `
        <div class="group-card">
          <div class="group-card-title">Group ${g.groupIndex}</div>
          ${g.members.map(m => `
            <div class="group-member">
              <span class="group-member-name${m.isSus ? ' sus' : ''}">${escHtml(m.username)}</span>
              ${m.isSus ? '<span class="group-member-mark">SUS</span>' : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    // ── Connection indicator ────────────────────────────────────────────────
    function setConnected(live) {
      const dot    = document.getElementById('conn-dot');
      const label  = document.getElementById('conn-label');
      const banner = document.getElementById('offline-banner');
      dot.className = live ? 'live' : 'offline';
      label.textContent = live ? 'LIVE' : 'OFFLINE';
      if (live) banner.classList.remove('visible');
      else      banner.classList.add('visible');

      const btn = document.getElementById('advance-btn');
      if (btn) btn.disabled = !live;
    }

    // ── Game over ───────────────────────────────────────────────────────────
    function showGameOver(winner, condition) {
      const titleEl = document.getElementById('game-over-title');
      const subEl   = document.getElementById('game-over-sub');

      if (winner === 'phos') {
        titleEl.style.color = 'var(--blue)';
        titleEl.textContent = 'ΦΩΣ WINS';
      } else if (winner === 'skotia') {
        titleEl.style.color = 'var(--red)';
        titleEl.textContent = 'ΣΚΟΤΊΑ WINS';
      } else {
        titleEl.style.color = 'var(--text)';
        titleEl.textContent = 'GAME OVER';
      }

      subEl.textContent = condition ? condition.toUpperCase().replace('_', ' ') : '';
      document.getElementById('game-over-overlay').classList.add('visible');
    }

    // ── Control panel actions ───────────────────────────────────────────────
    function unlockControls() {
      const input = document.getElementById('token-input');
      const val = (input && input.value.trim()) || gmToken;
      if (!val) return;
      gmToken = val;
      document.getElementById('token-gate').style.display = 'none';
      document.getElementById('controls').classList.add('visible');

      if (socket) { socket.disconnect(); connectSocket(); }
    }

    function advanceMovement() {
      if (!socket || !socket.connected) return;
      const btn = document.getElementById('advance-btn');
      btn.disabled = true;
      socket.emit('gmAdvance', { gameId }, (res) => {
        btn.disabled = false;
        if (res && res.error) alert('Error: ' + res.error);
        else fetchState();
      });
    }

    // ── Helpers ─────────────────────────────────────────────────────────────
    function setText(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const sp = document.getElementById('setup-password');
      if (sp) sp.addEventListener('keydown', e => { if (e.key === 'Enter') setupLogin(); });
    });
  </script>
</body>
</html>
